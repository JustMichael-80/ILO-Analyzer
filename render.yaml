services:
  - type: web
    name: ilo-analyzer
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn engine:app --host 0.0.0.0 --port $PORT --app-dir backend
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
      - key: PYTHON_VERSION
        value: 3.11.9
